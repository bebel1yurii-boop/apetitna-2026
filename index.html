<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Апетитна 2026 | PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui; margin: 0; }
        .radial-progress { transform: rotate(-90deg); transition: stroke-dashoffset 1s ease-in-out; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DATA = {
            target_date: "2026-06-01", // Початок VIP-кампанії
            partners: [
                { 
                    id: "p1", 
                    name: "Партнер Київ Центр", 
                    agents: [
                        { code: "7777", name: "Юрій К. (Ви)", akb_target: 5224, akb_curr: 2450, vp_target: 96365, vp_curr: 45000 },
                        { code: "1234", name: "Олександр М.", akb_target: 150, akb_curr: 142, vp_target: 2800, vp_curr: 2750 },
                        { code: "5678", name: "Іван П.", akb_target: 150, akb_curr: 138, vp_target: 2800, vp_curr: 2500 }
                    ]
                }
            ],
            sku: [
                { r: 1, n: "Крильця 'Солодкий чилі'", a: "10668", tips: "🔥 Топ для гриля" },
                { r: 2, n: "Крильця в гірчично-мед.", a: "14687", tips: "🍯 М'який смак" },
                { r: 3, n: "Стегна 'Айдахо'", a: "10670", tips: "🥔 Ситна вечеря" }
            ]
        };

        const Dashboard = ({ agent, partner, onLogout }) => {
            const [timeLeft, setTimeLeft] = useState("");
            const akbPerc = Math.min(100, (agent.akb_curr / agent.akb_target) * 100);
            const vpPerc = Math.min(100, (agent.vp_curr / agent.vp_target) * 100);
            
            const radius = 70;
            const circ = 2 * Math.PI * radius;

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = new Date(DATA.target_date) - new Date();
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    setTimeLeft(`${days} дн.`);
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="p-4 max-w-md mx-auto pb-20">
                    <header className="flex justify-between items-center mb-4">
                        <div className="text-orange-500 font-black italic text-xs uppercase tracking-tighter">МХП | {partner.name}</div>
                        <button onClick={onLogout} className="text-[9px] text-slate-500 uppercase font-bold bg-slate-800 px-3 py-1 rounded-full">Вихід</button>
                    </header>

                    {/* ТАЙМЕР ТА КВАЛІФІКАЦІЯ */}
                    <div className="grid grid-cols-2 gap-3 mb-4 text-center">
                        <div className="bg-slate-800/80 p-3 rounded-2xl border border-slate-700">
                            <p className="text-[8px] text-slate-400 uppercase font-bold mb-1 italic">До барбекю-сезону</p>
                            <p className="text-xl font-black text-blue-400">{timeLeft}</p>
                        </div>
                        <div className="bg-slate-800/80 p-3 rounded-2xl border border-slate-700">
                            <p className="text-[8px] text-slate-400 uppercase font-bold mb-1 italic">Кваліфікація ВП (кг)</p>
                            <p className={`text-xl font-black ${vpPerc >= 100 ? 'text-green-400' : 'text-orange-400'}`}>{Math.round(vpPerc)}%</p>
                        </div>
                    </div>

                    {/* АКБ ПРОГРЕС */}
                    <div className="relative flex items-center justify-center mb-6 bg-slate-800/40 rounded-[3rem] py-8">
                        <svg className="w-56 h-56" viewBox="0 0 200 200">
                            <circle cx="100" cy="100" r={radius} fill="none" stroke="#1e293b" strokeWidth="12" />
                            <circle cx="100" cy="100" r={radius} fill="none" stroke="#f97316" strokeWidth="12" strokeLinecap="round"
                                className="radial-progress" strokeDasharray={circ} strokeDashoffset={circ - (akbPerc/100)*circ} />
                        </svg>
                        <div className="absolute text-center">
                            <div className="text-5xl font-black italic">{agent.akb_curr}</div>
                            <div className="text-[9px] text-slate-500 uppercase font-bold mt-1 italic">АКБ (Ціль: {agent.akb_target})</div>
                        </div>
                    </div>

                    {/* LEADERBOARD ТОП-3 */}
                    <section className="mb-6">
                        <h3 className="text-[9px] font-black uppercase text-slate-500 ml-2 mb-2 tracking-widest italic">📊 Рейтинг ТОП-3 (Партнер)</h3>
                        <div className="space-y-1.5 bg-slate-800/40 p-3 rounded-[2rem] border border-slate-700/50">
                            {partner.agents.sort((a,b) => b.akb_curr - a.akb_curr).slice(0,3).map((a, i) => (
                                <div key={i} className={`flex justify-between items-center p-2 rounded-xl ${a.code === agent.code ? 'bg-orange-500/20 border border-orange-500/30' : ''}`}>
                                    <span className="text-[11px] font-medium"><span className="opacity-40 mr-2">{i+1}.</span>{a.name}</span>
                                    <span className="text-[11px] font-black text-orange-400">{a.akb_curr} ТТ</span>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* SKU З ПІДКАЗКАМИ */}
                    <section className="mb-6">
                        <h3 className="text-[9px] font-black uppercase text-slate-500 ml-2 mb-2 tracking-widest italic">🔥 Пріоритети SKU</h3>
                        <div className="space-y-2">
                            {DATA.sku.map(s => (
                                <div key={s.r} className="bg-slate-800/80 p-3 rounded-2xl border border-slate-700/50">
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-xs font-bold text-slate-200"><span className="text-orange-500 mr-2">{s.r}</span> {s.n}</span>
                                        <span className="text-[8px] text-blue-400 font-bold uppercase">{s.tips}</span>
                                    </div>
                                    <p className="text-[9px] text-slate-500 italic">Артикул: {s.a}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* МЕРЧ */}
                    <div className="grid grid-cols-2 gap-3 opacity-90">
                        <div className={`p-4 rounded-3xl border text-center ${akbPerc >= 50 && vpPerc >= 50 ? 'bg-orange-500/10 border-orange-500/40' : 'opacity-20'}`}>
                            <div className="text-3xl mb-1">👜</div>
                            <p className="text-[9px] font-black uppercase">Термосумка</p>
                        </div>
                        <div className={`p-4 rounded-3xl border text-center ${akbPerc >= 100 && vpPerc >= 100 ? 'bg-orange-500/10 border-orange-500/40' : 'opacity-20'}`}>
                            <div className="text-3xl mb-1">🔊</div>
                            <p className="text-[9px] font-black uppercase">Колонка</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [session, setSession] = useState(null);
            const [pId, setPid] = useState('');
            const [code, setCode] = useState('');

            useEffect(() => {
                const s = localStorage.getItem('mhp_session');
                if (s) setSession(JSON.parse(s));
            }, []);

            const login = () => {
                const p = DATA.partners.find(x => x.id === pId);
                const a = p?.agents.find(x => x.code === code);
                if (a) {
                    const s = { partner: p, agent: a };
                    localStorage.setItem('mhp_session', JSON.stringify(s));
                    setSession(s);
                } else alert("Помилка входу!");
            };

            if (session) return <Dashboard agent={session.agent} partner={session.partner} onLogout={() => {localStorage.removeItem('mhp_session'); setSession(null);}} />;

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="w-full max-w-sm bg-slate-800 p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
                        <h1 className="text-orange-500 font-black text-2xl mb-8 text-center uppercase italic tracking-tighter">Апетитна 2026</h1>
                        <select onChange={e => setPid(e.target.value)} className="w-full bg-slate-700 p-4 rounded-2xl mb-4 text-white outline-none border border-slate-600">
                            <option value="">Оберіть партнера...</option>
                            {DATA.partners.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                        <input type="password" placeholder="Код ТА / СВ" onChange={e => setCode(e.target.value)} className="w-full bg-slate-700 p-4 rounded-2xl mb-6 outline-none text-white border border-slate-600"/>
                        <button onClick={login} className="w-full bg-orange-600 p-4 rounded-2xl font-black uppercase tracking-widest shadow-lg">Увійти</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
